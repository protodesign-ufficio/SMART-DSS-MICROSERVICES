services:
  replanning-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: replanning-service
    ports:
      - "8001:8001"
    environment:
      REPLANNING_SERVICE_HOST: "0.0.0.0"
      REPLANNING_SERVICE_PORT: "8001"
      KAFKA_BOOTSTRAP_SERVERS: "host.docker.internal:9092"
      KAFKA_ANALYTICS_TOPIC: "analytics_ais.raw"
      KAFKA_GROUP_ID: "replanning-service-group"
      REPLANNING_THETA_MIN: "10"
      REPLANNING_THETA_CRITICAL_MIN: "30"
      REPLANNING_MAX_LATE: "2"
      REPLANNING_MAX_CRITICAL: "1"
      REPLANNING_TOTAL_DELAY_MAX: "60"
      REPLANNING_SINGLE_DELAY_MAX: "40"
      REPLANNING_HORIZON_MINUTES: "120"
      REPLANNING_COOLDOWN_MINUTES: "30"
      REPLANNING_FREEZE_WINDOW_MINUTES: "15"
    restart: unless-stopped
